<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Code Puzzle</title>
  <style>
    :root {
      --bg: #000;
      --panel: rgba(0, 0, 0, 0.28);
      --panelBorder: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --iconSize: clamp(58px, 6.6vw, 116px);
      --gap: clamp(5px, 0.55vw, 12px);
      --answerBg: rgba(255,255,255,0.10);
      --buttonBg: rgba(255,255,255,0.06);
      --yellow: #f4c542;
      --yellowBright: #ffd96a;
      --shadow: 0 16px 42px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      color: var(--text);
    }

    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    .bgDim {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.10), rgba(0,0,0,0.56)),
        linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0.44));
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .panel {
      width: min(1900px, calc(100vw - 40px));
      padding: clamp(18px, 2vw, 30px);
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--panelBorder);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .rows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(22px, 3.2vh, 40px);
    }

    .iconRow {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--gap);
      flex-wrap: nowrap;
    }

    .slot,
    .circleBtn {
      width: var(--iconSize);
      height: var(--iconSize);
      min-width: var(--iconSize);
      min-height: var(--iconSize);
      flex: 0 0 var(--iconSize);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slot {
      background: var(--answerBg);
      border: none;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .circleBtn {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      padding: 0;
      margin: 0;
      background: var(--buttonBg);
      border: 5px solid var(--yellow);
      box-shadow: 0 0 0 2px rgba(255, 212, 90, 0.18), 0 10px 24px rgba(0,0,0,0.30);
      outline: none;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, filter 0.14s ease;
      touch-action: manipulation;
      user-select: none;
    }

    .circleBtn:hover,
    .circleBtn:focus-visible {
      transform: scale(1.08);
      border-color: var(--yellowBright);
      box-shadow: 0 0 0 3px rgba(255, 220, 110, 0.22), 0 14px 30px rgba(0,0,0,0.34);
    }

    .circleBtn:active {
      transform: scale(0.90);
      filter: brightness(1.15);
    }

    .slot img,
    .circleBtn img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .slot.filled {
      animation: popIn 0.28s ease;
      background: rgba(255,255,255,0.16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10), 0 12px 26px rgba(0,0,0,0.28);
    }

    .slot.filled img {
      animation: iconBounce 0.30s ease;
    }

    .status {
      min-height: 1.2em;
      text-align: center;
      font-size: clamp(16px, 2vw, 24px);
      font-weight: 700;
      margin-top: 14px;
    }

    .hidden {
      display: none !important;
    }

    .resultOverlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .resultCard {
      width: min(92vw, 1000px);
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .resultCard img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.45));
    }

    .panel.loseFlash {
      animation: losePanelShake 0.78s ease, loseRedFlash 0.78s ease;
    }

    .panel.loseFlash .slot,
    .panel.loseFlash .circleBtn {
      animation: loseRedPulse 0.78s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.55); opacity: 0.35; }
      65% { transform: scale(1.16); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes iconBounce {
      0% { transform: scale(0.8); }
      60% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes losePanelShake {
      0%, 100% { transform: translateX(0); }
      12% { transform: translateX(-18px); }
      24% { transform: translateX(16px); }
      36% { transform: translateX(-14px); }
      48% { transform: translateX(12px); }
      60% { transform: translateX(-10px); }
      72% { transform: translateX(8px); }
      84% { transform: translateX(-5px); }
    }

    @keyframes loseRedFlash {
      0% { box-shadow: var(--shadow); }
      25% { box-shadow: 0 0 0 10px rgba(255, 50, 50, 0.18), 0 0 40px rgba(255, 0, 0, 0.45); }
      50% { box-shadow: 0 0 0 16px rgba(255, 50, 50, 0.24), 0 0 55px rgba(255, 0, 0, 0.55); }
      100% { box-shadow: var(--shadow); }
    }

    @keyframes loseRedPulse {
      0% { filter: none; }
      20% { filter: saturate(1.3) brightness(1.1) drop-shadow(0 0 12px rgba(255,0,0,0.4)); }
      45% { filter: saturate(1.0) brightness(0.95); }
      70% { filter: saturate(1.3) brightness(1.1) drop-shadow(0 0 12px rgba(255,0,0,0.4)); }
      100% { filter: none; }
    }

    @media (max-width: 1500px) {
      :root {
        --iconSize: clamp(50px, 6.3vw, 106px);
        --gap: clamp(5px, 0.55vw, 12px);
      }
    }

    @media (max-width: 1000px) {
      :root {
        --iconSize: clamp(34px, 6.1vw, 78px);
        --gap: clamp(3px, 0.45vw, 8px);
      }

      .panel {
        width: calc(100vw - 20px);
        padding: 14px 10px;
      }

      .circleBtn {
        border-width: 4px;
      }

      .slot img,
      .circleBtn img {
        width: 78%;
        height: 78%;
      }
    }
  </style>
</head>
<body>
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4" />
  </video>
  <div class="bgDim"></div>

  <main class="app">
    <section class="panel" aria-label="Code entry panel">
      <div class="rows">
        <div class="iconRow" id="attemptRow"></div>
        <div class="iconRow" id="pickerRow"></div>
      </div>
      <div class="status" id="statusText"></div>
    </section>
  </main>

  <div class="resultOverlay hidden" id="winOverlay" aria-hidden="true">
    <div class="resultCard">
      <img src="win.png" alt="You win" />
    </div>
  </div>

  <audio id="winSound" preload="auto" src="sounds/win.wav"></audio>
  <audio id="loseSound" preload="auto" src="sounds/lose.wav"></audio>

  <script>
    const SECRET_CODE = [4, 10, 9, 8, 7, 6, 12, 5, 11, 3, 2, 1];

    const SETTINGS = {
      totalIcons: 12,
      sequenceLength: 12,
      iconPath: (n) => `${n}.png`,
      iconSoundPath: (n) => `sounds/${n}.mp3`,
      resetDelayMs: 900,
      winOverlayHideAfterMs: 0
    };

    const state = {
      attempt: [],
      locked: false,
      clickSounds: []
    };

    const attemptRow = document.getElementById('attemptRow');
    const pickerRow = document.getElementById('pickerRow');
    const statusText = document.getElementById('statusText');
    const winOverlay = document.getElementById('winOverlay');
    const winSound = document.getElementById('winSound');
    const loseSound = document.getElementById('loseSound');
    const panel = document.querySelector('.panel');

    function preloadClickSounds() {
      state.clickSounds = [];
      getIconNumbers().forEach((n) => {
        const a = new Audio(SETTINGS.iconSoundPath(n));
        a.preload = 'auto';
        state.clickSounds[n] = a;
      });
    }

    function playClickSound(n) {
      const sound = state.clickSounds[n];
      if (!sound) return;
      try {
        sound.currentTime = 0;
        sound.play();
      } catch (err) {
        console.warn('Could not play click sound', n, err);
      }
    }

    function playSound(el) {
      if (!el) return;
      try {
        el.currentTime = 0;
        el.play();
      } catch (err) {
        console.warn('Could not play sound', err);
      }
    }

    function createImg(src, alt = '') {
      const img = document.createElement('img');
      img.src = src;
      img.alt = alt;
      return img;
    }

    function createSlot(index) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.index = index;
      return slot;
    }

    function getIconNumbers() {
      return Array.from({ length: SETTINGS.totalIcons }, (_, i) => i + 1);
    }

    function shuffleArray(items) {
      const shuffled = [...items];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function createPickerButton(n) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'circleBtn';
      btn.setAttribute('aria-label', `Choose icon ${n}`);
      btn.dataset.value = n;
      btn.appendChild(createImg(SETTINGS.iconPath(n), `Icon ${n}`));
      btn.addEventListener('click', () => handleIconClick(n));
      return btn;
    }

    function buildAttemptSlots() {
      attemptRow.innerHTML = '';
      for (let i = 0; i < SETTINGS.sequenceLength; i += 1) {
        attemptRow.appendChild(createSlot(i));
      }
    }

    function buildPickerButtons() {
      pickerRow.innerHTML = '';
      const buttonOrder = shuffleArray(getIconNumbers());
      buttonOrder.forEach((n) => {
        pickerRow.appendChild(createPickerButton(n));
      });
    }

    function renderAttempt() {
      const slots = attemptRow.querySelectorAll('.slot');
      slots.forEach((slot, index) => {
        slot.innerHTML = '';
        slot.classList.remove('filled');
        const value = state.attempt[index];
        if (value !== undefined) {
          slot.appendChild(createImg(SETTINGS.iconPath(value), `Chosen icon ${value}`));
          slot.classList.add('filled');
        }
      });
    }

    function handleIconClick(n) {
      if (state.locked) return;
      if (state.attempt.length >= SETTINGS.sequenceLength) return;

      playClickSound(n);
      state.attempt.push(n);
      renderAttempt();

      if (state.attempt.length === SETTINGS.sequenceLength) {
        checkAttempt();
      }
    }

    function arraysMatch(a, b) {
      if (a.length !== b.length) return false;
      return a.every((v, i) => v === b[i]);
    }

    function checkAttempt() {
      state.locked = true;
      const success = arraysMatch(state.attempt, SECRET_CODE);

      if (success) {
        statusText.textContent = '';
        playSound(winSound);
        showWin();
      } else {
        statusText.textContent = '';
        playSound(loseSound);
        triggerLoseEffect();
      }
    }

    function resetAttempt() {
      state.attempt = [];
      state.locked = false;
      buildPickerButtons();
      renderAttempt();
      statusText.textContent = '';
    }

    function triggerLoseEffect() {
      panel.classList.remove('loseFlash');
      void panel.offsetWidth;
      panel.classList.add('loseFlash');

      window.setTimeout(() => {
        panel.classList.remove('loseFlash');
        resetAttempt();
      }, SETTINGS.resetDelayMs);
    }

    function showWin() {
      winOverlay.classList.remove('hidden');
      winOverlay.setAttribute('aria-hidden', 'false');

      if (SETTINGS.winOverlayHideAfterMs > 0) {
        window.setTimeout(() => {
          winOverlay.classList.add('hidden');
          winOverlay.setAttribute('aria-hidden', 'true');
        }, SETTINGS.winOverlayHideAfterMs);
      }
    }

    function init() {
      if (SECRET_CODE.length !== SETTINGS.sequenceLength) {
        console.error('SECRET_CODE length must match SETTINGS.sequenceLength');
      }
      preloadClickSounds();
      buildAttemptSlots();
      buildPickerButtons();
      renderAttempt();
      statusText.textContent = '';
    }

    init();
  </script>
</body>
</html>
